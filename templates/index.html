<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pipeline Dashboard</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #f4f6f9; margin:0; padding:0; }
        header { background: #0078d7; color:white; padding:20px; text-align:center; }
        main { max-width:800px; margin:30px auto; background:white; padding:25px; border-radius:8px; }
        input[type="text"] { width:70%; padding:10px; border:1px solid #ccc; border-radius:6px; }
        button { padding:10px 18px; margin-left:10px; background:#0078d7; color:white; border:none; border-radius:6px; cursor:pointer; }
        button:hover { background:#005a9e; }
        .chart-container { text-align:center; margin-top:20px; }
        img { max-width:100%; border:1px solid #ddd; border-radius:6px; padding:5px; background:#fafafa; }
        footer { text-align:center; padding:15px; font-size:12px; color:#777; }
    </style>
</head>
<body>
    <header>
        <h1>Pipeline Dashboard</h1>
    </header>
    <main>
        <h2>Submit Input</h2>
        <form method="POST">
            <input type="text" name="user_input" placeholder="Enter your value here">
            <button type="submit">Submit</button>
        </form>

        {% if message %}
        <p><strong>{{ message }}</strong></p>
        {% endif %}

        <h2>Generated Chart</h2>
        <div class="chart-container">
            <img src="/static/chart.png" alt="Generated Chart">
        </div>
    </main>
    <footer>
        &copy; 2026 Pipeline Dashboard
    </footer>
</body>
</html>
